apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
        # --- ĐOẠN SỬA ĐÚNG CHUẨN CỦA HELM CHART ---
        alertmanager:
          config:
            global:
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'nguyenkhang.28102004@gmail.com'
              smtp_auth_username: 'nguyenkhang.28102004@gmail.com'
              smtp_auth_password: 'ctvbpmgtsbesnycq'
              smtp_require_tls: true

            route:
              receiver: email-receiver
              group_by:
              - alertname
              repeat_interval: 5m

            receivers:
            - name: email-receiver
              email_configs:
              - to: 'nguyenkhang.28102004@gmail.com'
                send_resolved: true
            - name: "null"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true