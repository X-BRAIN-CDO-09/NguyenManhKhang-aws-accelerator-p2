apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  replicas: 4 
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: w9-api:1 
        imagePullPolicy: IfNotPresent 
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: ERROR_RATE
          value: "0" 
        - name: VERSION
          value: "v1"
        - name: DEPLOY_STAGE
          value: "on_dinh_v1" # Biến phụ giúp ArgoCD trigger sync
        readinessProbe: 
          httpGet:
            path: /healthz
            port: 8080
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate-analysis 
      steps:
        - setWeight: 25                         
        - pause: { duration: 3m } # Hệ thống sẽ dừng lại 3 phút ở bước 25% để chạy thử nghiệm              
        - setWeight: 50
        - pause: { duration: 2m }
        - setWeight: 100                        
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080