version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend

    container_name: backend

    restart: always

    environment:
      MONGO_URI: mongodb://mongodb:27017/notesdb

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    restart: always

    environment:
      REACT_APP_API: http://localhost:5000

    ports:
      - "3000:3000"

    depends_on:
      - backend